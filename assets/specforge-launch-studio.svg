<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">SpecForge Launch Studio</title>
  <desc id="desc">Architecture image for click-only specification building and launch handoff.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#f4f1fb"/></linearGradient><style>.title{font:700 42px Arial,sans-serif;fill:#172033}.sub{font:500 18px Arial,sans-serif;fill:#586578}.card{fill:#fff;stroke:#dadfeb;stroke-width:1.5;rx:18}.core{fill:#172a46;rx:24}.coreText{font:800 26px Arial,sans-serif;fill:#fff}.coreSub{font:500 14px Arial,sans-serif;fill:#d7e2f0}.label{font:700 18px Arial,sans-serif;fill:#172033}.body{font:500 14px Arial,sans-serif;fill:#586578}.line{stroke:#526fa3;stroke-width:2.5;fill:none;stroke-linecap:round}.tile{fill:#eef3ff;stroke:#c8d5ee;rx:12}</style></defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="78" class="title">SpecForge Launch Studio</text>
  <text x="72" y="112" class="sub">Click-only professional app specifications, 10-section exports, and Mercatus launch handoff.</text>
  <rect x="420" y="250" width="360" height="180" class="core"/>
  <text x="600" y="314" text-anchor="middle" class="coreText">Spec Export Engine</text>
  <text x="600" y="346" text-anchor="middle" class="coreSub">validate • export • handoff • launch</text>
  <rect x="70" y="170" width="310" height="112" class="card"/><text x="105" y="216" class="label">Click Choices</text><text x="105" y="246" class="body">App type, launch mode, pricing, integrations</text>
  <rect x="70" y="450" width="310" height="112" class="card"/><text x="105" y="496" class="label">10-Section Spec</text><text x="105" y="526" class="body">Overview through proof and acceptance</text>
  <rect x="820" y="170" width="310" height="112" class="card"/><text x="855" y="216" class="label">Portfolio Workspace</text><text x="855" y="246" class="body">Projects, tables, status, details</text>
  <rect x="820" y="450" width="310" height="112" class="card"/><text x="855" y="496" class="label">Mercatus Handoff</text><text x="855" y="526" class="body">Pricing, onboarding, go-live package</text>
  <path d="M380 226 C430 240 430 304 420 328" class="line"/><path d="M380 506 C430 482 430 398 420 362" class="line"/><path d="M820 226 C770 240 770 304 780 328" class="line"/><path d="M820 506 C770 482 770 398 780 362" class="line"/>
  <rect x="250" y="632" width="700" height="38" class="tile"/><text x="600" y="656" text-anchor="middle" font="700 14px Arial" fill="#526578">The spec is the product boundary before code starts moving.</text>
</svg>
