name: Verify Python Capsule Runtime

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev requirements
        run: python -m pip install -r requirements-dev.txt
      - name: Run Python tests
        run: python -m pytest tests/test_capsule_studio.py
      - name: List runtimes
        run: python -m capsule_studio.cli runtimes
      - name: Create Python capsule session
        run: python -m capsule_studio.cli create python --name ci-python
