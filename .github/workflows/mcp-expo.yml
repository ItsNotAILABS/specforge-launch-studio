name: Verify MCP AI Expo Bridge

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check MCP server initialize
        run: printf '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{}}\n' | python -m capsule_studio.mcp.server
      - name: Check MCP tools list
        run: printf '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' | python -m capsule_studio.mcp.server
      - name: Generate Expo capsule
        run: python -m capsule_studio.cli expo --name "CI Capsule App" --slug ci-capsule-app --out .capsule_studio/expo/ci-capsule-app
      - name: Verify Expo files
        run: test -f .capsule_studio/expo/ci-capsule-app/App.tsx && test -f .capsule_studio/expo/ci-capsule-app/app.json
